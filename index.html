<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<div id="plot" style="width:100vw;height:100vh;"></div>

<script>
async function loadData() {

    const res = await fetch("STATREF_points_BAC2WALK_wearables_04.csv");
    const text = await res.text();

    const lines = text.split("\n").slice(1);

    let x=[], y=[], z=[], c=[], name=[];

    for (let l of lines) {
        let s = l.split(",");

        if (s.length < 5) continue;

        x.push(+s[0]);
        y.push(+s[1]);
        z.push(+s[2]);
        c.push(+s[3]);
        name.push(s[4]);
    }

    const traceMOD = {
    x: x.filter((_,i)=>c[i]==0),
    y: y.filter((_,i)=>c[i]==0),
    z: z.filter((_,i)=>c[i]==0),
    mode: 'markers',
    type: 'scatter3d',
    name: 'Model',
    hovertext: name.filter((_,i)=>c[i]==0),
    hoverinfo: 'text',
    marker: { size: 4, color: 'blue' }
};

    const traceREF = {
    x: x.filter((_,i)=>c[i]==1),
    y: y.filter((_,i)=>c[i]==1),
    z: z.filter((_,i)=>c[i]==1),
    mode: 'markers',
    type: 'scatter3d',
    name: 'Reference',
    hovertext: name.filter((_,i)=>c[i]==1),
    hoverinfo: 'text',
    marker: { size: 4, color: 'red' }
};

    Plotly.newPlot('plot', [traceMOD, traceREF], {
        legend: { orientation: "h" }
    });
}

loadData();
</script>
