<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Walker animation</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>

<body>

<div style="padding:10px">
    Frame :
    <span id="frameLabel">0</span>

    <input id="slider" type="range" min="0" max="0" value="0" style="width:500px">
</div>

<div id="plot" style="width:100vw;height:90vh;"></div>

<script>

let walker;

async function loadData(){

    const res = await fetch("marche2_BAC2WALK_wearables_04.json");
    walker = await res.json(); 

    console.log("loaded frames:", walker.frames.length);

    const slider = document.getElementById("slider");
    slider.max = walker.nFrames - 1;

    slider.addEventListener("input", e => {
        updateFrame(Number(e.target.value));
    });

    // Layout initial (IMPORTANT pour stabilité)
    initPlot();

    updateFrame(0);
}

function initPlot(){

    const layout = {
        margin: {l:0, r:0, t:0, b:0},

        legend: {orientation: "h"},

        uirevision: "fixed", 

        paper_bgcolor: "white",
        plot_bgcolor: "white",

        scene: {

        aspectmode: "cube",

        camera: {
            eye: { x: 1.8, y: 1.8, z: 1.2 }
        },

        xaxis: {
            title: "ML",
            gridcolor: "#eee",
            range: [-0.5, 0.5],
            autorange: false
        },

        yaxis: {
            title: "AP",
            gridcolor: "#eee",
            range: [-0.8, 0.8],
            autorange: false
        },

        zaxis: {
            title: "V",
            gridcolor: "#eee",
            range: [-0.2, 1.2],
            autorange: false
        }
        }
    };

    Plotly.newPlot("plot", [], layout, {
        responsive: true,
        displayModeBar: false
    });
}

function extractPoints(frame){

    let x = [], y = [], z = [], labels = [];

    const isVec3 = (p) =>
        Array.isArray(p) &&
        p.length === 3 &&
        p.every(v => typeof v === "number" && isFinite(v));

    Object.entries(frame).forEach(([blockName, block]) => {

        if(blockName === "t" || blockName === "AxeCentral") return;

        Object.entries(block || {}).forEach(([side, sideData]) => {

            Object.entries(sideData || {}).forEach(([name, pos]) => {

                if(!isVec3(pos)) return;

                x.push(pos[0]);
                y.push(pos[1]);
                z.push(pos[2]);

                labels.push(`${blockName}_${side}_${name}`);
            });
        });
    });

    return {x, y, z, labels};
}

function updateFrame(tt){

    document.getElementById("frameLabel").innerText = tt;

    const frame = walker.frames[String(tt)];
    if(!frame) return;

    const pts = extractPoints(frame);

    const trace = {
        x: pts.x,
        y: pts.y,
        z: pts.z,
        text: pts.labels,
        mode: "markers+lines",
        type: "scatter3d",

        line: {
            width: 2,
            color: "rgba(120,120,120,0.4)"
        },

        marker: {
            size: 3,
            color: pts.z,
            colorscale: "Viridis",
            opacity: 0.85
        }
    };

    Plotly.react("plot", [trace], {
        margin: {l:0, r:0, t:0, b:0},
        uirevision: "fixed",
        scene: {
            aspectmode: "cube",
            xaxis: {
                title: "ML",
                range: [-0.5, 0.5],
                autorange: false,
                gridcolor: "#eee"
            },
            yaxis: {
                title: "AP",
                range: [-0.8, 0.8],
                autorange: false,
                gridcolor: "#eee"
            },
            zaxis: {
                title: "V",
                range: [-0.2, 1.2],
                autorange: false,
                gridcolor: "#eee"
            },
            camera: {
                eye: { x: 1.8, y: 1.8, z: 1.2 }
            }
        }
    });
}
loadData();

</script>

</body>
</html>
