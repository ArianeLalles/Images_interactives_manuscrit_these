<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Walker animation</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>

<body>

<div style="padding:10px">
    Frame :
    <span id="frameLabel">0</span>

    <input id="slider" type="range" min="0" max="0" value="0" style="width:500px">
</div>

<div id="plot" style="width:100vw;height:90vh;"></div>

<script>

let walker;

async function loadData(){

    walker = await fetch("walker.json").then(r => r.json());

    const slider = document.getElementById("slider");
    slider.max = walker.nFrames - 1;

    slider.addEventListener("input", e => {
        updateFrame(Number(e.target.value));
    });

    updateFrame(0);
}

function extractPoints(frame){

    let x = [], y = [], z = [], labels = [];

    const isVec3 = (p) =>
        Array.isArray(p) &&
        p.length === 3 &&
        p.every(v => typeof v === "number" && isFinite(v));

    Object.entries(frame).forEach(([blockName, block]) => {

        if(blockName === "t" || blockName === "AxeCentral") return;

        Object.entries(block || {}).forEach(([side, sideData]) => {

            Object.entries(sideData || {}).forEach(([name, pos]) => {

                if(!isVec3(pos)) return;

                x.push(pos[0]);
                y.push(pos[1]);
                z.push(pos[2]);

                labels.push(`${blockName}_${side}_${name}`);
            });
        });
    });

    return {x,y,z,labels};
}
function updateFrame(tt){

    document.getElementById("frameLabel").innerText = tt;

    const frame = walker.frames[tt];

    const pts = extractPoints(frame);

    const trace = {

        x: pts.x,
        y: pts.y,
        z: pts.z,

        text: pts.labels,
        mode: "markers",
        type: "scatter3d",

        marker: {
            size: 4,
            color: "blue"
        },

        name: "Walker"
    };

    Plotly.react(
        "plot",
        [trace],
        {
            legend: {orientation:"h"},
            scene: {
                aspectmode: "data",
                xaxis: {title:"ML"},
                yaxis: {title:"AP"},
                zaxis: {title:"V"}
            }
        }
    );
}

loadData();

</script>

</body>
</html>
