<!DOCTYPE html>

<html>

<head>
<meta charset="utf-8">
<title>Walker animation</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>

<body>

<div style="padding:10px">

    Frame :
    <span id="frameLabel">0</span>

    <input
        id="slider"
        type="range"
        min="0"
        max="0"
        value="0"
        style="width:500px">

</div>

<div id="plot" style="width:100vw;height:90vh;"></div>

<script>

let walker;

async function loadData(){

    walker = await fetch("walker.json")
        .then(r => r.json());

    const slider = document.getElementById("slider");

    slider.max = walker.nFrames - 1;

    slider.addEventListener("input",e=>{
        updateFrame(Number(e.target.value));
    });

    updateFrame(0);
}

function updateFrame(tt){

    document.getElementById("frameLabel").innerText = tt;

    const frame = walker.frames[tt];

    let x = [];
    let y = [];
    let z = [];
    let labels = [];

    if(frame.mod){

        ["D","G"].forEach(side => {

            if(!frame.mod[side]) return;

            Object.entries(frame.mod[side]).forEach(([name,pos]) => {

                if(!Array.isArray(pos))
                    return;

                if(pos.length !== 3)
                    return;

                x.push(pos[0]);
                y.push(pos[1]);
                z.push(pos[2]);

                labels.push(side + "_" + name);

            });

        });

    }

    const traceMOD = {

        x:x,
        y:y,
        z:z,

        text:labels,

        mode:"markers+text",
        type:"scatter3d",

        textposition:"top center",

        marker:{
            size:4,
            color:"blue"
        },

        name:"Model"

    };

    Plotly.react(
        "plot",
        [traceMOD],
        {

            legend:{
                orientation:"h"
            },

            scene:{

                aspectmode:"data",

                xaxis:{title:"ML"},
                yaxis:{title:"AP"},
                zaxis:{title:"V"}

            }

        }
    );
}

loadData();

</script>

</body>

</html>
