<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Walker animation</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>

<body>

<div style="padding:10px">
    Frame :
    <span id="frameLabel">0</span>

    <input id="slider" type="range" min="0" max="0" value="0" style="width:500px">
</div>

<div id="plot" style="width:100vw;height:90vh;"></div>

<script>

let walker;

let currentFrame = 0;

async function loadData(){

    const res = await fetch("marche2_BAC2WALK_wearables_04.json");
    walker = await res.json(); 

    console.log("loaded frames:", walker.frames.length);

    const slider = document.getElementById("slider");
    slider.max = walker.nFrames - 1;

    slider.addEventListener("input", e => {
        updateFrame(Number(e.target.value));
    });

    initPlot();
    updateFrame(0);
}

function initPlot(){

    const layout = {
        margin: {l:0, r:0, t:0, b:0},
        uirevision: "fixed",

        scene: {
            aspectmode: "cube",

            xaxis: { title: "ML", range: [-0.5, 0.5], gridcolor: "#eee" },
            yaxis: { title: "AP", range: [-0.8, 0.8], gridcolor: "#eee" },
            zaxis: { title: "V",  range: [-0.1, 1.2], gridcolor: "#eee" },

            camera: {
                eye: { x: 1.8, y: 1.8, z: 1.2 }
            }
        }
    };

    Plotly.newPlot("plot", [], layout, {
        responsive: true,
        displayModeBar: false
    });
}

function extractBlockPoints(frame, blockName, side){

    let x = [], y = [], z = [];

    const block = frame[blockName];
    if(!block || !block[side]) return {x, y, z};

    Object.entries(block[side]).forEach(([name, pos]) => {

    // Ne pas afficher COP ni GRF comme marqueurs
    if (name === "COP" || name === "GRF") return;

    if (
        Array.isArray(pos) &&
        pos.length === 3 &&
        pos.every(v => Number.isFinite(v))
    ){
        x.push(pos[0]);
        y.push(pos[1]);
        z.push(pos[2]);
    }
});

    return {x, y, z};
}

function makeMarkers(frame, blockName, side, color, symbol){

    const pts = extractBlockPoints(frame, blockName, side);

    return {
        x: pts.x,
        y: pts.y,
        z: pts.z,

        type: "scatter3d",
        mode: "markers",

        name: `${blockName}-${side}`,

        marker: {
            size: 4,
            color: color,
            symbol: symbol,
            opacity: 0.9
        }
    };
}

function makeCtHt(frame, blockName, side, color){

    const block = frame[blockName];
    if(!block || !block[side]) return null;

    const Ct = block[side].Ct;
    const Ht = block[side].Ht;

    if(!Ct || !Ht) return null;

    return {
        x: [Ct[0], Ht[0]],
        y: [Ct[1], Ht[1]],
        z: [Ct[2], Ht[2]],

        type: "scatter3d",
        mode: "lines",

        showlegend: false,

        line: {
            color: color,
            width: 5
        }
    };
}

function makeGRF(frame, side, color){

    const block = frame.ref;
    if(!block || !block[side]) return null;

    const COP = block[side].COP;
    const GRF = block[side].GRF;

    if(!COP || !GRF) return null;

    const scale = 0.001;

    return {
        x: [COP[0], COP[0] + scale * GRF[0]],
        y: [COP[1], COP[1] + scale * GRF[1]],
        z: [COP[2], COP[2] + scale * GRF[2]],

        type: "scatter3d",
        mode: "lines",

        name: `GRF-${side}`,

        line: {
            color: color,
            width: 6
        }
    };
}

function updateFrame(tt){

    currentFrame = tt;
    document.getElementById("frameLabel").innerText = tt;

    const frame = walker.frames[tt];
    if(!frame) return;

    const traces = [];

    ["D", "G"].forEach(side => {

        const color = side === "D" ? "red" : "blue";

        // ref = ronds
        traces.push(
            makeMarkers(frame, "ref", side, color, "circle")
        );

        // mod = carrés
        if(frame.mod){
            traces.push(
                makeMarkers(frame, "mod", side, color, "square")
            );
        }

        // castellaz = étoiles
        if(frame.castellaz){
            traces.push(
                makeMarkers(frame, "castellaz", side, color, "cross")
            );
        }

        // segment Ct-Ht uniquement pour ref
        const ctht = makeCtHt(frame, "ref", side, color);
        if(ctht) traces.push(ctht);

        // GRF
        const grf = makeGRF(frame, side, color);
        if(grf) traces.push(grf);
    });

    Plotly.react("plot", traces, {
        margin: {l:0, r:0, t:0, b:0},
        uirevision: "fixed",

        scene: {
            aspectmode: "cube",

            xaxis: {
                title: "ML",
                range: [-0.5, 0.5],
                gridcolor: "#eee"
            },

            yaxis: {
                title: "AP",
                range: [-0.8, 0.8],
                gridcolor: "#eee"
            },

            zaxis: {
                title: "V",
                range: [-0.1, 1.2],
                gridcolor: "#eee"
            },

            camera: {
                eye: {
                    x: 1.8,
                    y: 1.8,
                    z: 1.2
                }
            }
        }
    });
}
loadData();

</script>

</body>
</html>
